<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' file:; media-src 'self' data: blob:">
  <title></title>
  <link rel="stylesheet" href="pet.css">
</head>
<body>
  <div id="pet-root">
    <div class="flins-stack">
      <div id="pet-bubbles" class="pet-bubbles-column">
        <div id="timer-bubble" class="pet-chat-bubble pet-timer-bubble hidden" aria-hidden="true">
          <button type="button" id="timer-close" class="pet-bubble-close" aria-label="Hide timer">×</button>
          <p id="timer-label" class="pet-bubble-label">Timer</p>
          <p id="timer-display" class="pet-timer-display">0:00</p>
        </div>
        <div id="pin-bubble" class="pet-chat-bubble pet-pin-bubble hidden" aria-hidden="true">
          <p id="pin-text"></p>
          <span class="speech-tail"></span>
        </div>
        <div id="speech-bubble" class="pet-chat-bubble hidden" aria-hidden="true">
          <p id="speech-text"></p>
          <span class="speech-tail"></span>
        </div>
      </div>
      <div id="flins-wrap" class="flins-visual">
        <img id="flins" alt="Flins" draggable="false">
      </div>
    </div>
    <div id="pet-panel-overlay" class="pet-panel-overlay hidden" aria-hidden="true">
      <div class="pet-panel-card">
        <h2 id="pet-panel-title" class="pet-panel-title">Timer</h2>
        <div id="pet-panel-body"></div>
        <div class="pet-panel-actions">
          <button type="button" id="pet-panel-cancel" class="pet-panel-btn pet-panel-btn-secondary">Cancel</button>
          <button type="button" id="pet-panel-confirm" class="pet-panel-btn">Start</button>
        </div>
      </div>
    </div>
  </div>
  <script src="petAudioPlayer.js"></script>
  <script src="petPanels.js"></script>
  <script src="pet.js"></script>
</body>
</html>
