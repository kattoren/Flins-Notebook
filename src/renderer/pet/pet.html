<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' file:; media-src 'self' data: blob:">
  <title></title>
  <link rel="stylesheet" href="pet.css">
</head>
<body>
  <div id="pet-root">
    <div class="flins-stack">
      <div id="flins-wrap" class="flins-visual">
        <img id="flins" alt="Flins" draggable="false">
      </div>
    </div>
    <div id="pet-bubbles" class="pet-bubble-layer">
      <div id="pin-bubble" class="pet-chat-bubble pet-pin-bubble hidden" aria-hidden="true">
        <p id="pin-text"></p>
        <span class="speech-tail"></span>
      </div>
      <div id="timer-bubble" class="pet-chat-bubble pet-timer-bubble hidden" aria-hidden="true">
        <button type="button" id="timer-close" class="pet-bubble-close" aria-label="Hide timer">×</button>
        <p id="timer-title" class="pet-timer-title hidden"></p>
        <p id="timer-display" class="pet-timer-display">0:00</p>
      </div>
      <div id="levelup-bubble" class="pet-chat-bubble pet-levelup-bubble hidden" aria-hidden="true">
        <button type="button" id="levelup-close" class="pet-bubble-close" aria-label="Dismiss level up message">×</button>
        <p id="levelup-text"></p>
      </div>
      <div id="speech-bubble" class="pet-chat-bubble pet-speech-bubble hidden" aria-hidden="true">
        <button type="button" id="speech-close" class="pet-bubble-close" aria-label="Dismiss message">×</button>
        <p id="speech-text"></p>
      </div>
    </div>
  </div>
  <script src="petAudioPlayer.js"></script>
  <script src="pet.js"></script>
</body>
</html>
