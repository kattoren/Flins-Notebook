<body>

<div class="stage" id="stage">
  <img src="flins_stand_base.gif" alt="">
  <img src="flins_stand_eye_white.gif" style="top:510px; left:198px; clip-path: inset(18px 0 0 0); opacity: 0.7; will-change: transform;" alt="" id="whiteref">
  <div class="eye-mask">
    <img class="eyeball" id="eyeball" src="flins_stand_eye_ball.gif" style="left:22px; clip-path: inset(0 0 0 0);" alt="">
  </div>
  <img src="flins_stand_eye_lashes.gif" style="top:476px; left:166px; will-change: transform;" alt="" id="lashes">
</div>

<script>
  const socketCenter = { x: 198 + 375 / 2, y: 499 + 105 / 2 };
  const maxOffset = 18;
  const falloffStart = 40;
  const falloffEnd = 250;
  const ease = 0.18;
  const followFactor = 0.22;

  const eyeball = document.getElementById('eyeball');
  const whiteref = document.getElementById('whiteref');
  const lashes = document.getElementById('lashes');
  const stage = document.getElementById('stage');

  let targetX = 0, targetY = 0;
  let curX = 0, curY = 0;

  function onMouseMove(e) {
    const rect = stage.getBoundingClientRect();
    const scaleX = 777 / rect.width;
    const scaleY = 1115 / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    const dx = mx - socketCenter.x;
    const dy = my - socketCenter.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx);
    const t = Math.max(0, Math.min(1, (dist - falloffStart) / (falloffEnd - falloffStart)));

    targetX = Math.cos(angle) * maxOffset * t;
    targetY = Math.sin(angle) * maxOffset * t;
  }

  document.addEventListener('mousemove', onMouseMove);

  function animate() {
    curX += (targetX - curX) * ease;
    curY += (targetY - curY) * ease;
    eyeball.style.transform = `translate(${curX}px, ${curY}px)`;

    const fx = curX * followFactor;
    const fy = curY * followFactor;
    whiteref.style.transform = `translate(${fx}px, ${fy}px)`;
    lashes.style.transform = `translate(${fx}px, ${fy}px)`;

    requestAnimationFrame(animate);
  }
  animate();
</script>
